<style>
.project{
    display: grid;
    grid-template-columns: 1fr;
    gap: 1.5rem;
    margin-top: 3rem;
}

@media (min-width: 900px){
    .project{
        grid-template-columns: 1.2fr 1fr;
        align-items: start;
    }
}

/* TEXT SIDE */
.project-text{
    background: var(--card);
    padding: 1.5rem;
    border-radius: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.05);
}

/* PUBLICATION LIST */
.pub-list{
    padding-left: 1.2rem;
}
.pub-list li{
    margin-bottom: .6rem;
}
.pub-list a{
    text-decoration: none;
    color: #111;
}
.pub-list a:hover{
    text-decoration: underline;
}

/* IMAGE GRID */
.project-images{
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

/* IMAGE CARDS */
.project-images img{
    width: 100%;
    height: 180px;              /* KEY FIX: forces uniform height */
    object-fit: cover;         /* keeps proportions nicely cropped */
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    transition: transform .25s ease, box-shadow .25s ease;
}

/* hover effect */
.project-images img:hover{
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 8px 18px rgba(0,0,0,.15);
}

/* small screens */
@media (max-width: 600px){
    .project-images{
        grid-template-columns: 1fr;
    }
    .project-images img{
        height: 220px;
    }
}
</style>
